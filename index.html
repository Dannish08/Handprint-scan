<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handprint Biometric Scanner | Opening Ceremony</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050a14;
            --accent-blue: #00f2ff;
            --accent-blue-dim: rgba(0, 242, 255, 0.2);
            --accent-green: #00ff88;
            --accent-green-dim: rgba(0, 255, 136, 0.2);
            --text-color: #e0faff;
            --footer-bg: rgba(0, 40, 60, 0.4);
            --scanner-size: min(90vw, 85vh);
        }

        /* Prevent standard cursor to make it feel like a dedicated kiosk app */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        /* Subtle scanlines effect for CRT/Futuristic feel */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 1000;
            pointer-events: none;
        }

        .container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 0; position: relative;
            overflow: hidden;
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; z-index: 100;
            background: linear-gradient(to bottom, var(--bg-color), transparent);
            border-bottom: 1px solid var(--accent-blue-dim);
        }

        .glitch-text {
            font-size: 1.5rem; font-weight: 900; letter-spacing: 5px;
            color: var(--accent-blue);
            text-shadow: 0 0 10px var(--accent-blue);
        }

        .system-status {
            font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
            display: flex; align-items: center; gap: 15px;
        }

        .status-dot {
            width: 12px; height: 12px; background-color: var(--accent-blue);
            border-radius: 50%; box-shadow: 0 0 10px var(--accent-blue);
            animation: blink 1s infinite;
        }

        main { flex: 1; display: flex; justify-content: center; align-items: center; }

        .scanner-wrap {
            position: relative; width: var(--scanner-size); height: var(--scanner-size);
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .scanner-ring {
            position: absolute; border: 2px solid var(--accent-blue-dim);
            border-radius: 50%; animation: rotate 15s linear infinite;
        }

        .ring-1 { width: 100%; height: 100%; border-top: 3px solid var(--accent-blue); border-bottom: 3px solid var(--accent-blue); }
        .ring-2 { width: 85%; height: 85%; border-left: 2px solid var(--accent-blue); border-right: 2px solid var(--accent-blue); animation-direction: reverse; animation-duration: 20s; }

        .handprint-container {
            width: 100%; height: 100%;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            background: transparent;
            /* Sharp circular mask to clip the square edges */
            -webkit-mask-image: radial-gradient(circle at center, black 85%, transparent 90%);
            mask-image: radial-gradient(circle at center, black 85%, transparent 90%);
            overflow: hidden;
            mix-blend-mode: screen; /* Now properly blending with the parent background */
        }

        .hand-image {
            width: 100%; height: 100%;
            object-fit: contain;
            transform: scale(1.1); /* Slightly larger but still avoids cropping */
            /* Screen mode moved to container for proper alpha handling */
            filter: contrast(15) brightness(0.65) grayscale(1) drop-shadow(0 0 20px var(--accent-blue));
            opacity: 0.95;
            transition: all 0.5s ease;
        }

        .scan-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: var(--accent-blue);
            box-shadow: 0 0 25px var(--accent-blue), 0 0 50px var(--accent-blue);
            opacity: 0; z-index: 10;
            border-radius: 6px;
        }

        /* Interactive States */
        body.scanning .scan-bar { opacity: 1; animation: scan 3.5s linear infinite; }
        body.scanning .scanner-ring { animation-duration: 4s; border-color: var(--accent-blue); }
        body.scanning .scanner-wrap { transform: scale(1.25); }
        body.scanning .hand-image { transform: scale(1.2); opacity: 1; filter: brightness(1.7) contrast(1.5) drop-shadow(0 0 45px var(--accent-blue)); }

        body.authorized { --accent-blue: var(--accent-green); --accent-blue-dim: var(--accent-green-dim); }

        .authorized-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 5, 0.99); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: opacity 1.2s ease;
        }

        .authorized-overlay.visible { opacity: 1; visibility: visible; }
        .msg-content { text-align: center; }
        .msg-content h1 { font-size: 6rem; letter-spacing: 20px; color: var(--accent-green); text-shadow: 0 0 50px var(--accent-green); font-weight: 900; }
        .msg-content p { color: var(--accent-green); font-size: 1.2rem; letter-spacing: 12px; margin-top: 30px; opacity: 0.9; }

        footer { 
            position: fixed; bottom: 0; left: 0; width: 100%;
            display: flex; justify-content: center; padding: 20px; 
            border-top: 1px solid var(--accent-blue-dim);
            background: linear-gradient(to top, var(--bg-color), transparent);
            z-index: 100;
        }
        .data-stream { display: flex; gap: 50px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--accent-blue-dim); letter-spacing: 2px; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        .instructions { position: absolute; bottom: -80px; width: 100%; text-align: center; font-size: 1rem; letter-spacing: 5px; opacity: 0.6; font-weight: bold; }
        
        #reset-hint { position: fixed; bottom: 20px; right: 20px; font-size: 0.7rem; color: var(--accent-blue-dim); opacity: 0.2; }
        
        .hidden { display: none !important; }

        /* Fullscreen Button Styles */
        .fs-btn {
            background: transparent;
            border: 1px solid var(--accent-blue-dim);
            color: var(--accent-blue);
            padding: 8px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto; /* Override global cursor none */
        }

        .fs-btn:hover {
            background: var(--accent-blue-dim);
            box-shadow: 0 0 15px var(--accent-blue-dim);
        }

        .fs-btn svg { width: 16px; height: 16px; fill: currentColor; }

        @media (max-width: 800px), (orientation: portrait) {
            :root { --scanner-size: min(85vw, 80vh); }
            .container { padding: 0; }
            .glitch-text { font-size: 1rem; letter-spacing: 2px; }
            .msg-content h1 { font-size: 3.5rem; letter-spacing: 10px; }
            .msg-content p { font-size: 0.8rem; letter-spacing: 6px; }
            .data-stream { gap: 10px; font-size: 0.5rem; flex-wrap: nowrap; justify-content: center; }
            .system-status { font-size: 0.7rem; }
            header { padding: 15px 20px; }
            .header-top { width: 100%; display: flex; justify-content: space-between; align-items: center; }
            .instructions { bottom: -30px; font-size: 0.8rem; }
            footer { padding: 15px; }
        }
    </style>
</head>
<body class="idle">
    <div class="container" id="app">
        <header>
            <div class="header-top">
                <div class="glitch-text">BIOMETRIC TERMINAL v4.0</div>
                <button id="fs-toggle" class="fs-btn">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    <span>FULLSCREEN</span>
                </button>
            </div>
            <div class="system-status">
                <span class="status-dot"></span>
                <span id="status-text">WAITING FOR OPERATOR...</span>
            </div>
        </header>

        <main>
            <div class="scanner-wrap" id="scanner">
                <div class="scanner-ring ring-1"></div>
                <div class="scanner-ring ring-2"></div>
                
                <div class="handprint-container">
                    <img src="assets/handprint.png" alt="Biometric Target" class="hand-image">
                    <div class="scan-bar"></div>
                </div>

                <div class="instructions">
                    <p>PLACE HAND TO COMMENCE</p>
                </div>
            </div>
        </main>

        <footer>
            <div class="data-stream">
                <div>SYSTEM_STABILITY: 100%</div>
                <div>AUT_LVL: SUPREME</div>
                <div>READY_FOR_DEPLOY: TRUE</div>
            </div>
        </footer>
    </div>

    <!-- Final State Overlay -->
    <div id="authorized-msg" class="authorized-overlay hidden">
        <div class="msg-content">
            <h1>AUTHORIZED</h1>
            <p>COMMENCE OPENING CEREMONY</p>
        </div>
    </div>

    <!-- Interface Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            const scanner = document.getElementById('scanner');
            const statusText = document.getElementById('status-text');
            const authOverlay = document.getElementById('authorized-msg');
            
            let scanTimeout;
            const scanDuration = 4500; // 4.5 seconds for dramatic tension
            let isScanning = false;

            const startScan = (e) => {
                if (body.classList.contains('authorized') || isScanning) return;
                
                isScanning = true;
                body.classList.remove('idle');
                body.classList.add('scanning');
                statusText.innerText = 'CALIBRATING SCANNER... ANALYZING BIOMETRICS';
                
                scanTimeout = setTimeout(completeScan, scanDuration);
            };

            const cancelScan = () => {
                if (!isScanning || body.classList.contains('authorized')) return;
                
                clearTimeout(scanTimeout);
                isScanning = false;
                body.classList.remove('scanning');
                body.classList.add('idle');
                statusText.innerText = 'SCAN ABORTED. RE-AUTHENTICATION REQUIRED.';
            };

            const completeScan = () => {
                isScanning = false;
                body.classList.remove('scanning');
                body.classList.add('authorized');
                statusText.innerText = 'IDENTITY CONFIRMED. SYSTEM UNLOCKED.';
                
                setTimeout(() => {
                    authOverlay.classList.remove('hidden');
                    setTimeout(() => authOverlay.classList.add('visible'), 50);
                }, 800);
            };

            // Touch and Mouse Interaction
            scanner.addEventListener('mousedown', startScan);
            scanner.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                startScan(); 
            }, { passive: false });

            window.addEventListener('mouseup', cancelScan);
            window.addEventListener('touchend', cancelScan);

            // App Controls (Reset, Fullscreen)
            const resetApp = () => {
                body.classList.remove('authorized', 'scanning');
                body.classList.add('idle');
                authOverlay.classList.remove('visible');
                setTimeout(() => authOverlay.classList.add('hidden'), 1000);
                statusText.innerText = 'WAITING FOR BIOMETRIC SCAN...';

                // Show UI controls again if resetting
                document.getElementById('fs-toggle').classList.remove('hidden');
                document.getElementById('reset-hint').classList.remove('hidden');
                document.querySelector('.header-top').classList.remove('hidden');
                document.querySelector('footer').classList.remove('hidden');
            };

            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                // F for Fullscreen
                if (key === 'f') toggleFullscreen();
                // R for Reset
                if (key === 'r') resetApp();
            });

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.warn(`Error attempting to enable full-screen mode: ${err.message}`);
                    });
                    // Hide UI controls once fullscreen is engaged for a clean presentation
                    document.getElementById('fs-toggle').classList.add('hidden');
                    document.getElementById('reset-hint').classList.add('hidden');
                    document.querySelector('.header-top').classList.add('hidden');
                    document.querySelector('footer').classList.add('hidden');
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                        // Optional: show them back when exiting if needed, 
                        // but user specifically asked for them to disappear.
                    }
                }
            };

            document.getElementById('fs-toggle').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFullscreen();
            });
            
            // Hidden corner reset (Top Left 3 clicks)
            let cornerClicks = 0;
            const cornerZone = document.createElement('div');
            cornerZone.style.cssText = 'position:fixed;top:0;left:0;width:100px;height:100px;z-index:9999;';
            document.body.appendChild(cornerZone);
            cornerZone.addEventListener('click', () => {
                cornerClicks++;
                if (cornerClicks >= 3) {
                    resetApp();
                    cornerClicks = 0;
                }
                setTimeout(() => { cornerClicks = 0; }, 3000);
            });
        });
    </script>
    <div id="reset-hint">F: FULLSCREEN | R: RESET</div>
</body>
</html>
